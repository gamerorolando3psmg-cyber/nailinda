<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sorpresa ❤️</title>

    <style>
        body{
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            color: white;
        }

        h1{
            margin-top: 50px;
        }

        img{
            width: 80%;
            max-width: 700px;
            margin-top: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        a{
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #ff4d88;
            color: white;
            text-decoration: none;
            border-radius: 20px;
        }

        a:hover{
            background: #ff1f6b;
        }
    </style>
</head>

<body>

    <h1>💖 Esta es tu sorpresa 💖</h1>

    <img src="imagenes/imagenGrande.jpg" alt="Sorpresa">

    <br>

    <a href="index.html">Volver</a>

</body>
</html>
